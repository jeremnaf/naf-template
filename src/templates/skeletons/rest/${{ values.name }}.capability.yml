naftiko: "0.5"
info:
  label: "${{ values.name }}"
  description: "Exposes weather data via API catalog adapters"

capability:
  exposes:
    - type: rest
      port: 3000
      namespace: weather-api
      resources:
        - path: /weather/current
          description: "Current weather conditions"
          operations:
            - name: get-current
              method: GET
              call: open-meteo.get-current
              outputParameters:
                - type: object
                  mapping: $.current
                  properties:
                    temperature: { type: number, mapping: $.temperature_2m }
                    windspeed: { type: number, mapping: $.windspeed_10m }
                    weathercode: { type: number, mapping: $.weathercode }

        - path: /weather/alerts
          description: "Active weather alerts"
          operations:
            - name: list-alerts
              method: GET
              call: open-meteo.list-alerts
              outputParameters:
                - type: array
                  mapping: $.alerts
                  items:
                    - type: object
                      properties:
                        title: { type: string, mapping: $.title }
                        severity: { type: string, mapping: $.severity }

  consumes:
    - type: http
      namespace: open-meteo
      baseUri: "https://api.open-meteo.com/v1/"
      resources:
        - name: forecast
          path: forecast
          operations:
            - name: get-current
              method: GET
              label: "Get Current Weather"

        - name: alerts
          path: alerts
          operations:
            - name: list-alerts
              method: GET
              label: "List Active Alerts"
