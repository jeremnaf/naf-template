apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: Composant ${{ values.name }} créé via Backstage
  links:
    - url: https://github.com/${{ values.repoOwner }}/${{ values.repoName }}
      title: Voir les fichiers du dépôt
      icon: github
  annotations:
    backstage.io/source-location: url:https://github.com/${{ values.repoOwner }}/${{ values.repoName }}/blob/main/
    github.com/project-slug: ${{ values.repoOwner }}/${{ values.repoName }}
spec:
  type: service
  lifecycle: experimental
  owner: user:guest